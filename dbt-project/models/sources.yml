version: 2

sources:
  - name: novapay_raw
    database: "{{ env_var('BQ_PROJECT', 'datadog-ese-sandbox') }}"
    schema: "{{ env_var('BQ_DATASET_SOURCE', 'novapay_raw') }}"
    description: "Raw Kafka events landed by bq-sink"
    freshness:
      warn_after: { count: 10, period: minute }
      error_after: { count: 30, period: minute }
    loaded_at_field: event_ts
    tables:
      - name: limited_merch_events
        description: "Raw Limited Merch purchase events from the Box Box Bits AI checkout"
        columns:
          - name: event_id
            description: "UUID for the purchase event"
            data_tests:
              - not_null
              - unique
          - name: product_id
            description: "Merch product SKU"
            data_tests:
              - not_null
          - name: price_thb
            description: "Unit price in THB at time of purchase"
            data_tests:
              - not_null
