apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: __CR_SERVICE_NAME__
  labels:
    service: __CR_SERVICE_NAME__
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      labels:
        service: __CR_SERVICE_NAME__
      annotations:
        autoscaling.knative.dev/maxScale: "30"
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/startup-cpu-boost: "true"
        # VPC connector — routes private-range traffic through novapay-vpc-connector
        # so Cloud Run can reach Redpanda Internal LB (10.148.0.65:9092) without public firewall rules.
        run.googleapis.com/vpc-access-connector: projects/datadog-ese-sandbox/locations/asia-southeast1/connectors/novapay-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      containers:
        - name: app
          image: __IMAGE_URI__
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            failureThreshold: 3
            periodSeconds: 240
            tcpSocket:
              port: 8080
            timeoutSeconds: 240
          env:
            # App config
            - name: APP_URL
              value: "__APP_URL__"
            - name: APPLET_ID
              value: "__APPLET_ID__"
            - name: NEXT_PUBLIC_APPLET_ID
              value: "__APPLET_ID__"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            # RUM (baked into client bundle at build time, also needed at runtime for SSR)
            - name: NEXT_PUBLIC_DATADOG_CLIENT_TOKEN
              value: "__NEXT_PUBLIC_DATADOG_CLIENT_TOKEN__"
            - name: NEXT_PUBLIC_DATADOG_APPLICATION_ID
              value: "__NEXT_PUBLIC_DATADOG_APPLICATION_ID__"
            - name: NEXT_PUBLIC_DATADOG_SITE
              value: "__NEXT_PUBLIC_DATADOG_SITE__"
            - name: NEXT_PUBLIC_DATADOG_SERVICE
              value: "__NEXT_PUBLIC_DATADOG_SERVICE__"
            - name: NEXT_PUBLIC_DATADOG_ENV
              value: "__NEXT_PUBLIC_DATADOG_ENV__"
            - name: NEXT_PUBLIC_DD_VERSION
              value: "__NEXT_PUBLIC_DD_VERSION__"
            # APM — serverless-init (ENTRYPOINT) handles the local agent process.
            # instrumentation.ts calls tracer.init({ llmobs }) at Next.js startup.
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: NUTTEE_DD_API_KEY
                  key: latest
            - name: DD_SITE
              value: "__DD_SITE__"
            - name: DD_SERVICE
              value: "__DD_SERVICE__"
            - name: DD_ENV
              value: "__DD_ENV__"
            - name: DD_VERSION
              value: "__DD_VERSION__"
            - name: DD_LOGS_ENABLED
              value: "true"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_SOURCE
              value: "nodejs"
            - name: DD_LLMOBS_ENABLED
              value: "1"
            - name: DD_LLMOBS_ML_APP
              value: "__DD_LLMOBS_ML_APP__"
            # AI Guard
            - name: DD_TRACE_ENABLED
              value: "true"
            - name: DD_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: NUTTEE_DD_APP_KEY
                  key: latest
            - name: DD_AI_GUARD_ENABLED
              value: "true"
            - name: DD_AI_GUARD_BLOCK
              value: "__DD_AI_GUARD_BLOCK__"
            # Data Streams Monitoring — auto-instruments KafkaJS producer
            # Docs: https://docs.datadoghq.com/data_streams/setup/language/nodejs/
            - name: DD_DATA_STREAMS_ENABLED
              value: "true"
            # Required for correct service naming in the DSM topology map
            - name: DD_TRACE_REMOVE_INTEGRATION_SERVICE_NAMES_ENABLED
              value: "true"
            # Data pipeline — Redpanda Internal LB IP (VPC only, reachable via VPC connector)
            - name: REDPANDA_BROKERS
              value: "10.148.0.65:9092"
            - name: BQ_PROJECT
              value: "datadog-ese-sandbox"
            - name: BQ_SA_KEY_JSON
              valueFrom:
                secretKeyRef:
                  name: NOVAPAY_BQ_SA_KEY
                  key: latest
            # Demo control toggles (toggled without redeploy via gcloud run services update)
            - name: DEMO_ERROR_INJECT
              value: "false"

  traffic:
    - latestRevision: true
      percent: 100
