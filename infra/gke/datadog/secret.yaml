#     --namespace=data-pipeline \
#     --from-literal=api-key=<DD_API_KEY>
#
# This file is a reference template only. The actual secret is created by the
# setup command above and is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: data-pipeline
type: Opaque
stringData:
  api-key: "REPLACE_WITH_DD_API_KEY"
